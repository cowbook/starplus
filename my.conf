server {
    listen 80;
    server_name star.guoxingas.com;
    return 301 https://$server_name$request_uri;
}

server {

    listen 443 ssl;
    server_name star.guoxingas.com;

    # SSL 配置
    #ssl_certificate /home/ubuntu/xlearn/cert/star.jsgxgas.com_bundle.crt;
    #ssl_certificate_key /home/ubuntu/xlearn/cert/star.jsgxgas.com.key;

    #ssl_certificate /etc/letsencrypt/live/star.jsgxgas.com/fullchain.pem;
    #ssl_certificate_key /etc/letsencrypt/live/star.jsgxgas.com/privkey.pem;

    
   

    # 静态文件配置
    location / {
        root /home/ubuntu/starplus/client/dist/;
        try_files $uri $uri/ /index.html;
    }



    location /api/ {
        try_files $uri $uri/ @backend;
    }

    
    location @backend {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }



    # 其他配置
    client_max_body_size 50M;
    # keepalive_timeout 5;

    ssl_certificate /etc/letsencrypt/live/star.guoxingas.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/star.guoxingas.com/privkey.pem; # managed by Certbot
}